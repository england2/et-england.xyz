  <footer>
  {{ partial "foot_custom.html" . }}
  {{ with .Site.Params.footer }}
  <hr/>
  {{ replace . "{Year}" now.Year | markdownify }}
  {{ end }}
  </footer>
  {{ if .Store.Get "hasMermaid" }}
  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.esm.min.mjs";
    mermaid.initialize({
      startOnLoad: true,
      theme: "base",
      fontFamily: "\"Noto Sans Mono\", \"Cascadia Mono\", \"DejaVu Sans Mono\", Menlo, Consolas, Monaco, \"Courier New\", monospace",
      themeVariables: {
        background: "#334455",
        textColor: "#e8f0f7",
        primaryColor: "#435a71",
        primaryTextColor: "#e8f0f7",
        primaryBorderColor: "#9cb9d3",
        secondaryColor: "#3d5166",
        secondaryTextColor: "#e8f0f7",
        secondaryBorderColor: "#9cb9d3",
        tertiaryColor: "#2b3a49",
        tertiaryTextColor: "#e8f0f7",
        tertiaryBorderColor: "#7f94a8",
        lineColor: "#9cb9d3",
        edgeLabelBackground: "#334455",
        clusterBkg: "#3b4f63",
        clusterBorder: "#9cb9d3",
        fontFamily: "\"Noto Sans Mono\", \"Cascadia Mono\", \"DejaVu Sans Mono\", Menlo, Consolas, Monaco, \"Courier New\", monospace"
      }
    });
  </script>
  {{ end }}
  </body>
</html>
