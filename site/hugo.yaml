baseurl: "https://example.org/"  # please update this to your actual URL
languageCode: "en-us"
title: "A minimal Hugo website"
theme: "hugo-xmin"
googleAnalytics: ""
disqusShortname: ""
ignoreFiles: ["\\.Rmd$", "\\.Rmarkdown$", "_cache$"]
footnotereturnlinkcontents: "↩"

permalinks:
  note: "/note/:year/:month/:day/:slug/"
  post: "/:slug/"

menu:
  main:
    - name: Home
      url: ""
      weight: 1
    - name: About
      url: "about/"
      weight: 2
    - name: All Work
      url: "all-work/"
      weight: 2


params:
  description: "A website built through Hugo and blogdown."
  footer: "&copy; [Elan England](https://site) 2024 -- {Year} | [Github](https://github.com/england02) | [BlueSky](https://bsky.app/profile/yihui.org)"

markup:
  highlight:
    codeFences: true
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
          - - \[
            - \]
          - - $$
            - $$
          inline:
          - - \(
            - \)
